<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Reviews</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'system-ui', 'sans-serif'], display: ['Outfit', 'system-ui', 'sans-serif'] },
                    colors: { primary: { 400: '#f19340', 500: '#ed751a', 600: '#de5b10', 700: '#b84410' }, slate: { 800: '#1e293b', 900: '#0f172a', 950: '#0d1321' } }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-slate-950 text-slate-100 antialiased min-h-screen">

    <!-- Setup Screen (first time only) -->
    <div id="setup-screen" class="hidden min-h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-sm p-8 rounded-2xl bg-slate-800/50 border border-slate-700/50">
            <h1 class="font-display text-2xl font-bold mb-2">Create Your Login</h1>
            <p class="text-slate-400 text-sm mb-6">Pick a username and password. That's it.</p>
            <div class="space-y-3">
                <input type="text" id="setup-user" placeholder="Username" autocomplete="off"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500">
                <input type="password" id="setup-pass" placeholder="Password"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500">
                <input type="password" id="setup-pass2" placeholder="Confirm password"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500">
            </div>
            <button id="setup-btn" class="w-full py-3 mt-4 bg-primary-500 text-white rounded-xl font-semibold hover:bg-primary-600 transition">Create Account</button>
            <p id="setup-error" class="text-red-400 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden min-h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-sm p-8 rounded-2xl bg-slate-800/50 border border-slate-700/50">
            <h1 class="font-display text-2xl font-bold mb-2">Admin Login</h1>
            <p class="text-slate-400 text-sm mb-6">Log in to manage reviews.</p>
            <div class="space-y-3">
                <input type="text" id="login-user" placeholder="Username" autocomplete="off"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500">
                <input type="password" id="login-pass" placeholder="Password"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500">
            </div>
            <button id="login-btn" class="w-full py-3 mt-4 bg-primary-500 text-white rounded-xl font-semibold hover:bg-primary-600 transition">Log In</button>
            <p id="login-error" class="text-red-400 text-sm mt-3 hidden"></p>
            <button id="reset-btn" class="mt-4 text-xs text-slate-500 hover:text-slate-300 transition">Reset credentials</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden min-h-screen">
        <nav class="bg-slate-950/90 backdrop-blur-md border-b border-slate-800/50 px-6 py-4">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <span class="font-display font-bold text-xl text-primary-400">Review Manager</span>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-sm text-slate-400 hover:text-slate-100 transition">Back to Site</a>
                    <button id="logout-btn" class="text-sm text-slate-400 hover:text-red-400 transition">Log Out</button>
                </div>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto px-6 py-10">
            <div class="p-8 rounded-2xl bg-slate-800/50 border border-slate-700/50 mb-10">
                <h2 class="font-display text-xl font-semibold mb-6">Add a Review</h2>
                <p class="text-slate-400 text-sm mb-4">Copy from the Formspree email and paste here. Hit Post to make it live instantly.</p>
                <form id="add-form" class="space-y-4">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Name</label>
                            <input type="text" id="r-name" required placeholder="Client's name"
                                class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Service</label>
                            <select id="r-service" required
                                class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary-500">
                                <option value="tutoring">Math & Science Tutoring</option>
                                <option value="website">Website Development</option>
                                <option value="beats">Romulus Beats</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Rating</label>
                        <select id="r-rating" required
                            class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary-500">
                            <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733; (5)</option>
                            <option value="4">&#9733;&#9733;&#9733;&#9733;&#9734; (4)</option>
                            <option value="3">&#9733;&#9733;&#9733;&#9734;&#9734; (3)</option>
                            <option value="2">&#9733;&#9733;&#9734;&#9734;&#9734; (2)</option>
                            <option value="1">&#9733;&#9734;&#9734;&#9734;&#9734; (1)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Review Text</label>
                        <textarea id="r-text" rows="3" required placeholder="What the client said..."
                            class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500 resize-none"></textarea>
                    </div>
                    <button type="submit" id="post-btn"
                        class="w-full py-3 bg-primary-500 text-white rounded-xl font-semibold hover:bg-primary-600 transition">
                        Post Review
                    </button>
                    <p id="post-status" class="text-sm mt-2 hidden"></p>
                </form>
            </div>

            <h2 class="font-display text-xl font-semibold mb-4">Current Reviews (<span id="review-count">0</span>)</h2>
            <div id="reviews-list" class="space-y-4 mb-10"></div>
        </div>
    </div>

    <script>
    const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/019ccac9-edd6-7f6e-86d9-8aea22c56106';
    const CREDS_KEY = 'admin_creds';
    let reviews = [];

    async function hashPass(pw) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Show correct screen
    (function() {
        if (!localStorage.getItem(CREDS_KEY)) {
            document.getElementById('setup-screen').classList.remove('hidden');
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
        }
    })();

    // Setup
    document.getElementById('setup-btn').addEventListener('click', async () => {
        const user = document.getElementById('setup-user').value.trim();
        const pass = document.getElementById('setup-pass').value;
        const pass2 = document.getElementById('setup-pass2').value;
        const err = document.getElementById('setup-error');
        err.classList.add('hidden');
        if (!user || !pass) { err.textContent = 'Fill in both fields.'; err.classList.remove('hidden'); return; }
        if (pass !== pass2) { err.textContent = 'Passwords don\'t match.'; err.classList.remove('hidden'); return; }
        if (pass.length < 4) { err.textContent = 'At least 4 characters.'; err.classList.remove('hidden'); return; }
        localStorage.setItem(CREDS_KEY, JSON.stringify({ user, hash: await hashPass(pass) }));
        document.getElementById('setup-screen').classList.add('hidden');
        await loadAndShow();
    });

    // Login
    document.getElementById('login-btn').addEventListener('click', async () => {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value;
        const err = document.getElementById('login-error');
        err.classList.add('hidden');
        if (!user || !pass) { err.textContent = 'Enter username and password.'; err.classList.remove('hidden'); return; }
        const creds = JSON.parse(localStorage.getItem(CREDS_KEY));
        if (user !== creds.user || (await hashPass(pass)) !== creds.hash) {
            err.textContent = 'Wrong username or password.'; err.classList.remove('hidden'); return;
        }
        document.getElementById('login-btn').textContent = 'Loading...';
        document.getElementById('login-screen').classList.add('hidden');
        await loadAndShow();
    });

    // Enter key
    document.querySelectorAll('#setup-screen input, #login-screen input').forEach(input => {
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') input.closest('[id$="-screen"]').querySelector('button').click();
        });
    });

    // Reset
    document.getElementById('reset-btn').addEventListener('click', () => {
        if (!confirm('Erase your saved login? You will create a new one.')) return;
        localStorage.removeItem(CREDS_KEY);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('login-user').value = '';
        document.getElementById('login-pass').value = '';
        document.getElementById('login-btn').textContent = 'Log In';
    });

    // Load reviews & show panel
    async function loadAndShow() {
        try {
            const res = await fetch(BLOB_URL);
            reviews = res.ok ? await res.json() : [];
        } catch { reviews = []; }
        document.getElementById('admin-panel').classList.remove('hidden');
        renderList();
    }

    // Post review
    document.getElementById('add-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('post-btn');
        const status = document.getElementById('post-status');
        btn.disabled = true; btn.textContent = 'Posting...'; status.classList.add('hidden');

        const review = {
            name: document.getElementById('r-name').value.trim(),
            service: document.getElementById('r-service').value,
            rating: parseInt(document.getElementById('r-rating').value, 10),
            text: document.getElementById('r-text').value.trim(),
            date: new Date().toISOString().split('T')[0]
        };
        reviews.unshift(review);

        try {
            const res = await fetch(BLOB_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reviews) });
            if (!res.ok) throw new Error('Save failed');
            status.textContent = 'Review is live!'; status.className = 'text-sm mt-2 text-green-400'; status.classList.remove('hidden');
            document.getElementById('add-form').reset(); renderList();
        } catch (e) {
            reviews.shift();
            status.textContent = 'Error: ' + e.message; status.className = 'text-sm mt-2 text-red-400'; status.classList.remove('hidden');
        } finally { btn.disabled = false; btn.textContent = 'Post Review'; }
    });

    // Delete review
    async function deleteReview(i) {
        if (!confirm('Remove this review?')) return;
        reviews.splice(i, 1);
        try {
            await fetch(BLOB_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reviews) });
            renderList();
        } catch (e) { alert('Error: ' + e.message); }
    }

    // Render
    const labels = { website: 'Web Dev', tutoring: 'Tutoring', beats: 'Beats', other: 'Other' };
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function renderList() {
        const list = document.getElementById('reviews-list');
        document.getElementById('review-count').textContent = reviews.length;
        if (!reviews.length) { list.innerHTML = '<p class="text-slate-500 text-center py-8">No reviews yet.</p>'; return; }
        list.innerHTML = reviews.map((r, i) => `
            <div class="p-5 rounded-xl bg-slate-800/50 border border-slate-700/50 flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-3 mb-1">
                        <span class="font-display font-semibold">${esc(r.name)}</span>
                        <span class="text-primary-400 text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                        <span class="text-slate-500 text-xs">${esc(labels[r.service] || r.service)}</span>
                    </div>
                    <p class="text-slate-400 text-sm">${esc(r.text)}</p>
                    <p class="text-slate-600 text-xs mt-1">${r.date}</p>
                </div>
                <button onclick="deleteReview(${i})" class="text-slate-500 hover:text-red-400 transition text-sm shrink-0" title="Remove">&#10005;</button>
            </div>
        `).join('');
    }
    </script>
</body>
</html>
